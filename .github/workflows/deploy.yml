name: Deploy WebsiteVintage

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: websitevintage-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, ubuntu, vintage]

    env:
      DEPLOY_ROOT: /var/www/vintage
      FRONTEND_DIR: /var/www/vintage/public
      BACKEND_DIR: /var/www/vintage/backend
      VITE_API_URL: /api

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      - name: Prepare deployment folders
        run: |
          mkdir -p "$DEPLOY_ROOT"
          mkdir -p "$FRONTEND_DIR"
          mkdir -p "$BACKEND_DIR/uploads/users"

      - name: Deploy backend
        run: |
          rsync -a --delete \
            --exclude '.env' \
            --exclude 'uploads/' \
            Backend/ "$BACKEND_DIR"/

      - name: Deploy frontend
        run: |
          rsync -a --delete Frontend/dist/ "$FRONTEND_DIR"/

      - name: Show deployment summary
        run: |
          echo "Frontend deployed to: $FRONTEND_DIR"
          echo "Backend deployed to: $BACKEND_DIR"